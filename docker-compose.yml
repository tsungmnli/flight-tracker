services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${FLIGHTS_DB_NAME}
      MYSQL_USER: ${FLIGHTS_DB_USER}
      MYSQL_PASSWORD: ${FLIGHTS_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:3306:3306"

  scheduler:
    build:
      context: .
      dockerfile: docker/scheduler.dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      FLIGHTS_DB_HOST: mysql
      FLIGHTS_DB_USER: ${FLIGHTS_DB_USER}
      FLIGHTS_DB_PASSWORD: ${FLIGHTS_DB_PASSWORD}
      FLIGHTS_DB_NAME: ${FLIGHTS_DB_NAME}
      EIA_API_KEY: ${EIA_API_KEY}
    volumes:
      - playwright_profile:/app/playwright_profile

  api:
    build:
      context: .
      dockerfile: docker/api.dockerfile
    ports:
      - "0.0.0.0:8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      FLIGHTS_DB_HOST: mysql
      FLIGHTS_DB_USER: ${FLIGHTS_DB_USER}
      FLIGHTS_DB_PASSWORD: ${FLIGHTS_DB_PASSWORD}
      FLIGHTS_DB_NAME: ${FLIGHTS_DB_NAME}
      ADMIN_API_KEY: ${ADMIN_API_KEY}

volumes:
  mysql_data:
  playwright_profile:
